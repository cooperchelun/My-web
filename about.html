<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>張哲綸 | 個人網頁 · 整面風格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #eef2fa;
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            color: #1a2c3e;
        }

        /* 整面主容器 — 無外距邊框，100%寬度，真正「整面」沉浸 */
        .fullpage {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            background: linear-gradient(145deg, #f8f9ff 0%, #eef2fa 100%);
        }

        /* 頁首區域 — 整面寬度，無邊界限制 */
        .hero {
            background: linear-gradient(135deg, #1f2e3f 0%, #0f1e2c 100%);
            padding: 3rem 5%;
            color: white;
            border-bottom: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
        }

        .hero-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            word-break: break-word;
        }

        .hero h1 a {
            color: #ffdd99;
            text-decoration: none;
            border-bottom: 3px solid #ffb347;
            transition: 0.2s;
        }

        .hero h1 a:hover {
            color: #fff0cf;
            border-bottom-color: #ffaa33;
        }

        /* 新版 tagline — 僅保留「我的資料」按鈕（個人網頁已刪除） */
        .hero-tagline {
            font-size: 1.15rem;
            opacity: 0.95;
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            row-gap: 0.8rem;
        }

        .hero-link-btn {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 3rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 180, 71, 0.5);
            color: #ffefcf;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .hero-link-btn:hover {
            background: #ffb347;
            color: #1f2e3f;
            border-color: #ffb347;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .hero-tagline-text {
            margin-right: 0.5rem;
            font-weight: 400;
            opacity: 0.9;
        }

        /* 內容區塊 — 整面但內部有舒適邊距，版面大器 */
        .content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 3rem 5%;
        }

        /* 卡片採用現代風格，無邊框陰影柔和，整面流暢 */
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            padding: 2rem 2.2rem;
            margin-bottom: 2rem;
            box-shadow: 0 15px 30px -12px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s ease, box-shadow 0.3s;
            border: 1px solid #ffffff70;
            backdrop-filter: blur(0px);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 35px -14px rgba(0, 0, 0, 0.12);
            background: #ffffff;
        }

        h2 {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #1f3a48;
            border-left: 8px solid #ffb347;
            padding-left: 1rem;
            letter-spacing: -0.2px;
        }

        .card-desc {
            color: #2c4b62;
            margin-bottom: 1.5rem;
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
        }

        /* 主按鈕 — 更顯眼，符合整面大氣 */
        .main-btn {
            background: linear-gradient(135deg, #ffb347 0%, #ff941a 100%);
            padding: 0.85rem 2rem;
            border-radius: 3rem;
            font-size: 1.05rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            box-shadow: 0 6px 14px rgba(255, 140, 0, 0.35);
            letter-spacing: 0.5px;
        }

        .main-btn:hover {
            background: linear-gradient(135deg, #ff9f2a 0%, #ff7b00 100%);
            transform: translateY(-3px);
            box-shadow: 0 12px 22px rgba(255, 100, 0, 0.4);
            color: white;
        }

        .main-btn:active {
            transform: translateY(1px);
        }

        /* 頁腳 — 整面延伸，寬廣舒適 */
        footer {
            background: #0f1a24;
            padding: 2rem 5%;
            text-align: center;
            font-size: 0.9rem;
            color: #bdd4e8;
            border-top: none;
            width: 100%;
            margin-top: 1rem;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-links {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #ffcd94;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            border-bottom: 1px dotted #ffb34770;
        }

        .footer-links a:hover {
            color: #ffb347;
            border-bottom-color: #ffb347;
        }

        /* 響應式調整 — 依然保持整面流暢感 */
        @media (max-width: 750px) {
            .hero {
                padding: 2rem 5%;
            }
            .hero h1 {
                font-size: 1.9rem;
            }
            .content {
                padding: 2rem 5%;
            }
            .card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .main-btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.95rem;
            }
            .hero-tagline {
                flex-direction: column;
                align-items: flex-start;
            }
            .hero-link-btn {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 1.6rem;
            }
            .card-desc {
                font-size: 0.95rem;
            }
            .footer-links {
                gap: 18px;
            }
        }

        /* 裝飾細節 */
        .highlight {
            background: linear-gradient(120deg, #ffecb3 0%, #ffecb3 40%, transparent 80%);
            padding: 0 4px;
            border-radius: 8px;
            font-weight: 600;
        }

        .card .main-btn {
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>
<div class="fullpage">
    <!-- 頁首區域：整面寬度、深色質感 -->
    <div class="hero">
        <div class="hero-content">
            <h1>
                <a href="https://www.mis.nsysu.edu.tw/" target="_blank" rel="noopener noreferrer">資管二B_411312155_張哲綸</a>
            </h1>
            <!-- 修改後：已刪除「個人網頁」連結，僅保留「我的資料」連至 introduc.html -->
            <div class="hero-tagline">
                <span class="hero-tagline-text">📌 快捷連結：</span>
                <!-- 僅留下「我的資料」按鈕，連結到 introduc.html -->
                <a href="introduc.html" class="hero-link-btn">
                    📄 我的資料
                </a>
            </div>
        </div>
    </div>

    <!-- 主要內容：保留三個核心區塊（已移除未來目標區塊），每個區塊只有一個主要按鈕 -->
    <div class="content">
        <!-- 區塊1：興趣何倫碼測驗結果 -->
        <div class="card">
            <h2>📊 興趣何倫碼測驗結果</h2>
            <div class="card-desc">
                <span class="highlight">社會型｜事務型｜企業型</span> — 傾向與人群互動、組織規劃與執行事務。透過專業測驗探索職涯錨點。
            </div>
            <!-- 單一按鈕：CCL's測驗結果，連結至 RSC.html -->
            <a href="RSC.html" class="main-btn">
                📑 CCL's測驗結果
            </a>
        </div>

        <!-- 區塊2：相關工作介紹 - 專案經理／PM -->
        <div class="card">
            <h2>💼 相關工作介紹</h2>
            <div class="card-desc">
                專案經理 / 專案管理師 PM — 為專案的成功策劃和執行負總責的人，整合資源、帶領團隊達成目標。
            </div>
            <!-- 單一按鈕：連結至外部詳細介紹 104職缺頁面 -->
            <a href="https://www.104.com.tw/job/projectmanager" target="_blank" rel="noopener noreferrer" class="main-btn">
                🔍 瞭解專案經理職務
            </a>
        </div>

        <!-- 區塊3：自傳履歷 + 參與組織 - 整合版，只有一個主要按鈕 -->
        <div class="card">
            <h2>📄 自傳履歷 & 參與組織</h2>
            <div class="card-desc">
                規劃自己的未來及參與的組織，累積專案實戰與團隊合作經驗。展現跨域領導力與執行力。
            </div>
            <!-- 單一按鈕：連結至 CakeResume 履歷平台 -->
            <a href="https://www.cakeresume.com/" target="_blank" rel="noopener noreferrer" class="main-btn">
                📄 檢視我的履歷 / 自傳
            </a>
        </div>
    </div>

    <!-- 頁腳：僅保留「回到頂部」連結與版權資訊 -->
    <footer>
        <div class="footer-inner">
            <div>© 2025 張哲綸 · 資管二B | 整面式個人學習網頁 · 精簡聚焦</div>
            <div class="footer-links">
                <a href="#" id="backToTop">⬆ 回到頂部</a>
            </div>
        </div>
    </footer>
</div>

<script>
    (function() {
        // 回到頂部功能 (平滑滾動)
        const backBtn = document.getElementById('backToTop');
        if (backBtn) {
            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // 載入日誌：說明已依照需求刪除快捷區域的「個人網頁」按鈕，僅保留「我的資料」連結至 introduc.html
        console.log('✅ 整面風格網頁已更新：快捷連結區塊已刪除「個人網頁」按鈕，僅保留「我的資料」導向 introduc.html 。版面更加乾淨。');

        // 增加鍵盤輔助: 使用者體驗細節
        const allMainBtns = document.querySelectorAll('.main-btn');
        allMainBtns.forEach(btn => {
            btn.addEventListener('focus', () => {
                btn.style.outline = '3px solid #ffb347';
                btn.style.outlineOffset = '3px';
            });
            btn.addEventListener('blur', () => {
                btn.style.outline = '';
            });
        });
    })();
</script>
</body>
</html>
